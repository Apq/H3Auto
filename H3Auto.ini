[General]
DisableOnStart=0      ; 战斗开始时是否禁用自动化：0=不禁用（默认启用），1=禁用

[Labels]
; 面板标签（可自定义翻译，无需重新编译）
Title=部队自动行动设置
; 行动策略标签（0-N）
Action0=手动
Action1=防御
Action2=近战攻击
Action3=随机射击
Action4=顺序射击
Action5=循环移动
; 目标策略标签（0-N）
Target0=无
Target1=指定位置
Target2=远程和高速优先
Target3=数量优先

[Hotkey]
StartAutomation=0x78   ; F7
StopAutomation=0x79     ; F8
