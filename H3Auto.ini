[General]
DisableOnStart=0      ; 战斗开始时是否禁用自动化：0=不禁用（默认启用），1=禁用

[Hotkeys]
; 战斗中人工接管热键（只影响本场执行权，不改 5 套方案/游标）
; 支持 F1-F12 / LControl / RControl / Control，或直接写虚拟键码（如 122、0x7B）
ToggleManual=F11      ; 切换本场「自动 / 全手动」
OneShotManual=LControl ; 锁定接管当前或下一支部队；该部队完成一次人工行动后恢复自动

[Panel]
Title=打铁设置

[Actions]
; 行动策略标签（键名 = AutoActionKind 枚举序号，必须与枚举严格对应）
; 注：2=等待 为占位保留下标稳定，面板下拉不再提供
0=手动
1=防御
2=等待
3=循环移动
4=循环近战
5=远程攻击
6=急救治疗

[Selectors]
; 目标选择器标签（键名 = AutoTargetSelector 枚举序号，必须与枚举严格对应）
; 远程攻击：0/1/2；急救治疗 UI 顺序：4→3→0（失血数值/失血比例/随机）
0=随机
1=远程高速优先
2=数量最多
3=失血比例
4=失血数值
