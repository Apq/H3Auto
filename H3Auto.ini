[General]
DisableOnStart=0      ; 战斗开始时是否禁用自动化：0=不禁用（默认启用），1=禁用

[Panel]
Title=部队自动行动设置

[Actions]
; 行动策略标签（键名 = AutoActionKind 枚举序号，必须与枚举严格对应）
; 注：2=等待 为占位保留下标稳定，面板下拉不再提供
0=手动
1=防御
2=等待
3=循环移动
4=循环近战
5=远程攻击
6=急救治疗
7=投石车攻击

[Sides]
; 阵营标签（键名 = AutoTargetSide 枚举序号）
0=自己
1=敌方
2=双方

[Selectors]
; 目标选择器标签（键名 = AutoTargetSelector 枚举序号，必须与枚举严格对应）
0=指定目标
1=随机
2=顺序
3=最近
4=最远
5=远程高速优先
6=数量最多
7=数量最少
8=伤最重
9=无
